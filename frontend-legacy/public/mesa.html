<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Mesa — Assistente</title>
  <link rel="stylesheet" href="/styles.css" />
  <style>
    .chat { display: flex; flex-direction: column; height: 60vh; }
    .messages { flex: 1; overflow-y: auto; padding: 1rem; background: #0f3460; border-radius: 8px; }
    .msg { margin: 0.5rem 0; padding: 0.5rem 0.75rem; border-radius: 8px; max-width: 85%; }
    .msg.user { background: #533483; margin-left: auto; }
    .msg.assistant { background: #1a1a2e; }
    .input-row { display: flex; gap: 0.5rem; margin-top: 1rem; }
    input, select, button { padding: 0.75rem; border-radius: 8px; border: none; }
    input { flex: 1; }
    button { background: #e94560; color: white; cursor: pointer; }
  </style>
</head>
<body>
  <header><h1>Atendimento na mesa</h1></header>
  <main>
    <div class="card">
      <label>Mesa ID (UUID): <input id="mesaId" style="width:100%" placeholder="cole o UUID da mesa" /></label>
      <button id="btnAbrirSessao" style="margin-top:0.5rem">Abrir sessão</button>
    </div>
    <div class="card chat">
      <div id="messages" class="messages"></div>
      <div class="input-row">
        <input id="input" placeholder="Ex: quero um hambúrguer e uma coca" />
        <button id="send">Enviar</button>
      </div>
    </div>
    <p><a href="/">← Voltar</a></p>
  </main>
  <script src="/mesa.js"></script>
</body>
</html>
