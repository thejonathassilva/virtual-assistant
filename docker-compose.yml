# Arquitetura LOCAL (padrão). Sem AWS/GCP/Azure obrigatório.
# Nuvem futura: DEPLOY_TARGET=aws|gcp|azure — ver docs/cloud-providers.md e env/cloud/*.env.example

# Evita TypeORM synchronize em DBs com dados legados; aplica migrations versionadas.
x-typeorm-migrations: &typeorm-migrations
  TYPEORM_SYNC: "false"
  TYPEORM_RUN_MIGRATIONS: "true"

services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./infra/postgres/init-databases.sql:/docker-entrypoint-initdb.d/init-databases.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    # Porta não exposta no host (evita conflito com Redis local); serviços usam rede interna
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  auth-service:
    build:
      context: ./services/auth-service
      dockerfile: Dockerfile
    environment:
      <<: *typeorm-migrations
      PORT: 3001
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/restaurante_auth
      JWT_SECRET: ${JWT_SECRET:-dev-jwt-secret}
      COGNITO_USER_POOL_ID: ${COGNITO_USER_POOL_ID:-}
      COGNITO_APP_CLIENT_ID: ${COGNITO_APP_CLIENT_ID:-}
      AWS_REGION: ${AWS_REGION:-us-east-1}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  catalog-service:
    build:
      context: ./services/catalog-service
      dockerfile: Dockerfile
    environment:
      <<: *typeorm-migrations
      PORT: 3002
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/restaurante_catalog
      REDIS_URL: redis://redis:6379
      UPLOAD_DIR: /app/uploads/produtos
      MEDIA_PUBLIC_PATH: /api/media/produtos
    volumes:
      - catalog_uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3002/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  tables-service:
    build:
      context: ./services/tables-service
      dockerfile: Dockerfile
    environment:
      <<: *typeorm-migrations
      PORT: 3003
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/restaurante_tables
      APP_URL: ${APP_URL:-http://localhost:4201}
      ORDERS_SERVICE_URL: http://orders-service:3004
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3003/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  orders-service:
    build:
      context: ./services/orders-service
      dockerfile: Dockerfile
    environment:
      <<: *typeorm-migrations
      PORT: 3004
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/restaurante_orders
      CATALOG_SERVICE_URL: http://catalog-service:3002
      TABLES_SERVICE_URL: http://tables-service:3003
      REALTIME_SERVICE_URL: http://realtime-service:3006
      AI_SERVICE_URL: http://ai-service:3005
    depends_on:
      postgres:
        condition: service_healthy
      catalog-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3004/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  ai-service:
    build:
      context: ./services/ai-service
      dockerfile: Dockerfile
    environment:
      <<: *typeorm-migrations
      PORT: 3005
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/restaurante_ai
      REDIS_URL: redis://redis:6379
      ORDERS_SERVICE_URL: http://orders-service:3004
      CATALOG_SERVICE_URL: http://catalog-service:3002
      REALTIME_SERVICE_URL: http://realtime-service:3006
      AWS_REGION: ${AWS_REGION:-us-east-1}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      BEDROCK_MODEL_ID: ${BEDROCK_MODEL_ID:-anthropic.claude-3-5-sonnet-20241022-v2:0}
      BEDROCK_KNOWLEDGE_BASE_ID: ${BEDROCK_KNOWLEDGE_BASE_ID:-}
      BEDROCK_GUARDRAIL_ID: ${BEDROCK_GUARDRAIL_ID:-}
      BEDROCK_GUARDRAIL_VERSION: ${BEDROCK_GUARDRAIL_VERSION:-1}
      LLM_PROVIDER: ${LLM_PROVIDER:-mock}
      BEDROCK_MOCK: ${BEDROCK_MOCK:-true}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      orders-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3005/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  realtime-service:
    build:
      context: ./services/realtime-service
      dockerfile: Dockerfile
    environment:
      PORT: 3006
      REDIS_URL: redis://redis:6379
      CORS_ORIGIN: ${APP_URL:-http://localhost:4201}
    depends_on:
      redis:
        condition: service_healthy
    ports:
      - "3006:3006"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3006/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  admin-service:
    build:
      context: ./services/admin-service
      dockerfile: Dockerfile
    environment:
      <<: *typeorm-migrations
      PORT: 3007
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/restaurante_admin
      AUTH_SERVICE_URL: http://auth-service:3001
      AI_SERVICE_URL: http://ai-service:3005
      CATALOG_SERVICE_URL: http://catalog-service:3002
      TABLES_SERVICE_URL: http://tables-service:3003
      QUOTA_RENEWAL_CHECK_HOURS: ${QUOTA_RENEWAL_CHECK_HOURS:-24}
      AWS_REGION: ${AWS_REGION:-us-east-1}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
      auth-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3007/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  api-gateway:
    build:
      context: ./services/api-gateway
      dockerfile: Dockerfile
    ports:
      - "3008:3000"
    environment:
      PORT: 3000
      JWT_SECRET: ${JWT_SECRET:-dev-jwt-secret}
      AUTH_SERVICE_URL: http://auth-service:3001
      CATALOG_SERVICE_URL: http://catalog-service:3002
      TABLES_SERVICE_URL: http://tables-service:3003
      ORDERS_SERVICE_URL: http://orders-service:3004
      AI_SERVICE_URL: http://ai-service:3005
      REALTIME_SERVICE_URL: http://realtime-service:3006
      ADMIN_SERVICE_URL: http://admin-service:3007
      CORS_ORIGIN: ${APP_URL:-http://localhost:4201}
    depends_on:
      auth-service:
        condition: service_healthy
      catalog-service:
        condition: service_healthy
      tables-service:
        condition: service_healthy
      orders-service:
        condition: service_healthy
      ai-service:
        condition: service_healthy
      realtime-service:
        condition: service_healthy
      admin-service:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "4201:80"
    depends_on:
      - api-gateway

volumes:
  pgdata:
  catalog_uploads:
