<div class="login-wrap">
  <mat-card class="login-card">
    <mat-card-header>
      <mat-card-title>Área restrita</mat-card-title>
      <mat-card-subtitle>Duas Mãos, Uma Mesa — equipe</mat-card-subtitle>
    </mat-card-header>
    <mat-card-content>
      <form [formGroup]="form" (ngSubmit)="submit()">
        <mat-form-field appearance="outline" class="full">
          <mat-label>Email</mat-label>
          <input matInput formControlName="email" type="email" />
        </mat-form-field>
        <mat-form-field appearance="outline" class="full">
          <mat-label>Senha</mat-label>
          <input matInput formControlName="senha" type="password" />
        </mat-form-field>
        @if (error()) {
          <p class="error">{{ error() }}</p>
        }
        <button mat-flat-button color="primary" class="full" type="submit" [disabled]="loading()">
          @if (loading()) {
            <mat-spinner diameter="20" />
          } @else {
            Entrar
          }
        </button>
      </form>
    </mat-card-content>
    <mat-card-actions>
      <a mat-button routerLink="/">← Voltar ao início</a>
    </mat-card-actions>
  </mat-card>
</div>
