<div class="page">
  <h2>Administração</h2>

  <nav class="page-nav">
    <a mat-stroked-button routerLink="/admin/produtos" routerLinkActive="active">Produtos</a>
    <a mat-stroked-button routerLink="/admin/usuarios" routerLinkActive="active">Usuários</a>
    <a mat-stroked-button routerLink="/admin/empresa" routerLinkActive="active">Empresa</a>
    <a mat-stroked-button routerLink="/admin/mesas" routerLinkActive="active">Mesas / QR</a>
    <a mat-stroked-button routerLink="/admin/config-ia" routerLinkActive="active">Config IA</a>
  </nav>

  <div class="grid">
    <mat-card>
      <mat-card-header>
        <mat-card-title>{{ empresa()?.nome || 'Empresa' }}</mat-card-title>
      </mat-card-header>
      <mat-card-content>
        <p>{{ empresa()?.endereco }}</p>
        <p>{{ empresa()?.telefone }}</p>
      </mat-card-content>
    </mat-card>

    <mat-card>
      <mat-card-header>
        <mat-card-title>Cardápio</mat-card-title>
        <mat-card-subtitle>{{ produtos().length }} produtos</mat-card-subtitle>
      </mat-card-header>
      <mat-card-content>
        <mat-list>
          @for (p of produtos().slice(0, 5); track p.id) {
            <mat-list-item>
              <span matListItemTitle>{{ p.nome }}</span>
              <span matListItemLine>{{ p.preco | currency: 'BRL' }}</span>
            </mat-list-item>
          }
        </mat-list>
      </mat-card-content>
    </mat-card>
  </div>
</div>
