<div class="page">
  <header class="page-header">
    <h2>Usuários da equipe</h2>
    <a mat-flat-button color="primary" routerLink="/admin/usuarios/novo">Novo usuário</a>
  </header>

  <mat-card class="panel-card">
    <table mat-table [dataSource]="usuarios()" class="full">
      <ng-container matColumnDef="nome">
        <th mat-header-cell *matHeaderCellDef>Nome</th>
        <td mat-cell *matCellDef="let u">{{ u.nome }}</td>
      </ng-container>
      <ng-container matColumnDef="email">
        <th mat-header-cell *matHeaderCellDef>Email</th>
        <td mat-cell *matCellDef="let u">{{ u.email }}</td>
      </ng-container>
      <ng-container matColumnDef="role">
        <th mat-header-cell *matHeaderCellDef>Perfil</th>
        <td mat-cell *matCellDef="let u">
          <span class="role-badge">{{ roleLabel(u.role) }}</span>
        </td>
      </ng-container>
      <ng-container matColumnDef="ativo">
        <th mat-header-cell *matHeaderCellDef>Ativo</th>
        <td mat-cell *matCellDef="let u">
          <mat-icon [class.status-ok]="u.ativo" [class.status-off]="!u.ativo">
            {{ u.ativo ? 'check_circle' : 'cancel' }}
          </mat-icon>
        </td>
      </ng-container>
      <ng-container matColumnDef="acoes">
        <th mat-header-cell *matHeaderCellDef></th>
        <td mat-cell *matCellDef="let u">
          <a mat-button [routerLink]="['/admin/usuarios', u.id]">Editar</a>
          @if (u.ativo) {
            <button mat-button color="warn" (click)="desativar(u)">Desativar</button>
          }
        </td>
      </ng-container>
      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
    </table>
  </mat-card>

  <p class="hint">
    <a routerLink="/admin">← Voltar ao painel</a>
  </p>
</div>
