<div class="page">
  <header class="page-header">
    <a mat-button routerLink="/admin">← Admin</a>
    <h2>Produtos</h2>
    <a mat-flat-button color="primary" routerLink="/admin/produtos/novo">+ Novo produto</a>
  </header>

  <mat-card class="panel-card">
    <table mat-table [dataSource]="produtos()" class="table">
      <ng-container matColumnDef="foto">
        <th mat-header-cell *matHeaderCellDef>Foto</th>
        <td mat-cell *matCellDef="let p">
          @if (showFoto(p)) {
            <img class="thumb" [src]="fotoUrl(p)!" [alt]="p.nome" (error)="onImgError(p.id)" />
          } @else {
            <div class="thumb-placeholder"><mat-icon>restaurant</mat-icon></div>
          }
        </td>
      </ng-container>
      <ng-container matColumnDef="nome">
        <th mat-header-cell *matHeaderCellDef>Nome</th>
        <td mat-cell *matCellDef="let p">{{ p.nome }}</td>
      </ng-container>
      <ng-container matColumnDef="categoria">
        <th mat-header-cell *matHeaderCellDef>Categoria</th>
        <td mat-cell *matCellDef="let p">{{ p.categoria | categoriaLabel }}</td>
      </ng-container>
      <ng-container matColumnDef="preco">
        <th mat-header-cell *matHeaderCellDef>Preço</th>
        <td mat-cell *matCellDef="let p" class="preco">{{ p.preco | currency: 'BRL' }}</td>
      </ng-container>
      <ng-container matColumnDef="ativo">
        <th mat-header-cell *matHeaderCellDef>Ativo</th>
        <td mat-cell *matCellDef="let p">
          <mat-chip [highlighted]="p.ativo">{{ p.ativo ? 'Sim' : 'Não' }}</mat-chip>
        </td>
      </ng-container>
      <ng-container matColumnDef="acoes">
        <th mat-header-cell *matHeaderCellDef></th>
        <td mat-cell *matCellDef="let p">
          <a mat-button [routerLink]="['/admin/produtos', p.id]">Editar</a>
        </td>
      </ng-container>
      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
    </table>
  </mat-card>
</div>
