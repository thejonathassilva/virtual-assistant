<h2>{{ usuarioId() ? 'Editar usuário' : 'Novo usuário' }}</h2>

@if (error()) {
  <p class="error">{{ error() }}</p>
}

<form [formGroup]="form" (ngSubmit)="salvar()">
  <mat-form-field appearance="outline" class="full">
    <mat-label>Nome</mat-label>
    <input matInput formControlName="nome" />
  </mat-form-field>

  <mat-form-field appearance="outline" class="full">
    <mat-label>Email</mat-label>
    <input matInput type="email" formControlName="email" />
  </mat-form-field>

  <mat-form-field appearance="outline" class="full">
    <mat-label>Perfil</mat-label>
    <mat-select formControlName="role">
      @for (r of roles; track r) {
        <mat-option [value]="r">{{ r }}</mat-option>
      }
    </mat-select>
  </mat-form-field>

  <mat-form-field appearance="outline" class="full">
    <mat-label>Senha {{ usuarioId() ? '(deixe vazio para manter)' : '' }}</mat-label>
    <input matInput type="password" formControlName="senha" autocomplete="new-password" />
  </mat-form-field>

  <mat-checkbox formControlName="ativo">Ativo</mat-checkbox>

  <div class="actions">
    <button mat-flat-button color="primary" type="submit" [disabled]="saving()">
      {{ saving() ? 'Salvando…' : 'Salvar' }}
    </button>
    <a mat-button routerLink="/admin/usuarios">Cancelar</a>
  </div>
</form>
