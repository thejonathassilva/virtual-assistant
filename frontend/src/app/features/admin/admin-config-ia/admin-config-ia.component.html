<div class="page form-page-wide">
  <a class="back-link" routerLink="/admin">← Admin</a>
  <h2>Configuração da IA</h2>

  <mat-card class="panel-card-padded">
    <form [formGroup]="form" (ngSubmit)="salvar()">
      <mat-form-field appearance="outline" class="full">
        <mat-label>System prompt</mat-label>
        <textarea matInput formControlName="prompt_sistema" rows="8"></textarea>
      </mat-form-field>
      <mat-form-field appearance="outline" class="full">
        <mat-label>Modelo</mat-label>
        <input matInput formControlName="modelo_id" />
      </mat-form-field>
      <div class="row">
        <mat-form-field appearance="outline">
          <mat-label>Temperature</mat-label>
          <input matInput type="number" step="0.1" formControlName="temperature" />
        </mat-form-field>
        <mat-form-field appearance="outline">
          <mat-label>Top P</mat-label>
          <input matInput type="number" step="0.1" formControlName="top_p" />
        </mat-form-field>
        <mat-form-field appearance="outline">
          <mat-label>Max tokens</mat-label>
          <input matInput type="number" formControlName="max_tokens" />
        </mat-form-field>
      </div>
      <button mat-flat-button color="primary" type="submit">Salvar configuração</button>
    </form>
  </mat-card>
</div>
