<mat-toolbar class="toolbar">
  <span class="brand">{{ toolbarTitle() }}</span>
  <span class="spacer"></span>
  @if (auth.user(); as u) {
    <span class="user">{{ u.nome }} ({{ u.role }})</span>
    <button mat-button (click)="logout()">Sair</button>
  }
</mat-toolbar>
<main class="main">
  <router-outlet />
</main>
