name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: |
            frontend/package-lock.json
            services/auth-service/package-lock.json
            services/catalog-service/package-lock.json
            services/orders-service/package-lock.json
            services/tables-service/package-lock.json

      - name: Build auth-service
        working-directory: services/auth-service
        run: |
          npm ci
          npm run build
          npm test

      - name: Build catalog-service
        working-directory: services/catalog-service
        run: |
          npm ci
          npm run build
          npm test

      - name: Build orders-service
        working-directory: services/orders-service
        run: |
          npm ci
          npm run build

      - name: Build remaining services
        run: |
          for svc in tables-service ai-service admin-service api-gateway realtime-service; do
            cd services/$svc
            npm ci
            npm run build
            cd ../..
          done

      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

  integration-test:
    runs-on: ubuntu-latest
    needs: build-and-test

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      CI: true
      NODE_ENV: test
      TYPEORM_SYNC: 'true'
      REDIS_URL: redis://localhost:6379

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: |
            services/auth-service/package-lock.json
            services/catalog-service/package-lock.json

      - name: Install PostgreSQL client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Create project databases
        run: bash scripts/init-test-databases.sh
        env:
          PGHOST: localhost
          PGPORT: 5432

      - name: Integration tests auth-service
        working-directory: services/auth-service
        run: |
          npm ci
          npm run test:integration
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/restaurante_auth

      - name: Integration tests catalog-service
        working-directory: services/catalog-service
        run: |
          npm ci
          npm run test:integration
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/restaurante_catalog

  smoke-test:
    runs-on: ubuntu-latest
    needs: build-and-test
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@v4

      - name: Smoke test (Docker Compose)
        shell: bash
        run: |
          docker compose up -d --build --wait
          for i in $(seq 1 60); do
            if curl -sf http://localhost:3008/api/health >/dev/null; then
              echo "API healthy"
              break
            fi
            sleep 5
          done
          curl -sf http://localhost:3008/api/health || (docker compose logs api-gateway; exit 1)
          pwsh -File scripts/smoke-test.ps1
          docker compose down -v

      - name: Dump logs on failure
        if: failure()
        run: docker compose logs --no-color
